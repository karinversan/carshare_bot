<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Админка кейсов</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
        overscroll-behavior-x: none;
      }

      html {
        -webkit-text-size-adjust: 100%;
        touch-action: pan-y;
        background: #eff4f2;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      img,
      video,
      canvas,
      svg {
        max-width: 100%;
        height: auto;
      }

      button,
      input,
      textarea {
        font: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
