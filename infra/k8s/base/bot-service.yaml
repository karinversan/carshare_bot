apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-service
  namespace: car-inspection
  labels:
    app.kubernetes.io/name: bot-service
    app.kubernetes.io/part-of: car-inspection-assistant
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bot-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bot-service
        app.kubernetes.io/part-of: car-inspection-assistant
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: bot-service
          image: car-inspection/bot-service:latest
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: car-inspection-config
            - secretRef:
                name: car-inspection-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: bot-service
  namespace: car-inspection
  labels:
    app.kubernetes.io/name: bot-service
    app.kubernetes.io/part-of: car-inspection-assistant
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: bot-service
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: http
