apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-panel
  namespace: car-inspection
  labels:
    app.kubernetes.io/name: admin-panel
    app.kubernetes.io/part-of: car-inspection-assistant
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-panel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-panel
        app.kubernetes.io/part-of: car-inspection-assistant
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: admin-panel
          image: car-inspection/admin-panel:latest
          ports:
            - containerPort: 5174
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 5174
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5174
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: admin-panel
  namespace: car-inspection
  labels:
    app.kubernetes.io/name: admin-panel
    app.kubernetes.io/part-of: car-inspection-assistant
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: admin-panel
  ports:
    - port: 5174
      targetPort: 5174
      protocol: TCP
      name: http
