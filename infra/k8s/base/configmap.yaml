apiVersion: v1
kind: ConfigMap
metadata:
  name: car-inspection-config
  namespace: car-inspection
  labels:
    app.kubernetes.io/part-of: car-inspection-assistant
data:
  DATABASE_URL: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/car_inspection"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"
  S3_ENDPOINT_URL: "http://minio:9000"
  S3_BUCKET_NAME: "car-inspection"
  S3_REGION: "us-east-1"
  INFERENCE_SERVICE_URL: "http://inference-service:8010"
  API_SERVICE_URL: "http://api-service:8000"
  BOT_SERVICE_URL: "http://bot-service:8001"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "car_inspection"
  POSTGRES_USER: "postgres"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_USE_SSL: "false"
  LOG_LEVEL: "INFO"
