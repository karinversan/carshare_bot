apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: car-inspection
  labels:
    app.kubernetes.io/name: worker-service
    app.kubernetes.io/part-of: car-inspection-assistant
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: worker-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker-service
        app.kubernetes.io/part-of: car-inspection-assistant
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker-service
          image: car-inspection/worker-service:latest
          command:
            - celery
            - -A
            - worker
            - worker
            - --loglevel=info
            - --concurrency=4
          envFrom:
            - configMapRef:
                name: car-inspection-config
            - secretRef:
                name: car-inspection-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - worker
                - inspect
                - ping
                - --timeout
                - "10"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - celery
                - -A
                - worker
                - inspect
                - ping
                - --timeout
                - "10"
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
