apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
  namespace: car-inspection
  labels:
    app.kubernetes.io/name: inference-service
    app.kubernetes.io/part-of: car-inspection-assistant
    app.kubernetes.io/component: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-service
        app.kubernetes.io/part-of: car-inspection-assistant
        app.kubernetes.io/component: ml
    spec:
      containers:
        - name: inference-service
          image: car-inspection/inference-service:latest
          ports:
            - containerPort: 8010
              name: http
          envFrom:
            - configMapRef:
                name: car-inspection-config
            - secretRef:
                name: car-inspection-secrets
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inference-service
  namespace: car-inspection
  labels:
    app.kubernetes.io/name: inference-service
    app.kubernetes.io/part-of: car-inspection-assistant
    app.kubernetes.io/component: ml
spec:
  selector:
    app.kubernetes.io/name: inference-service
  ports:
    - port: 8010
      targetPort: 8010
      protocol: TCP
      name: http
