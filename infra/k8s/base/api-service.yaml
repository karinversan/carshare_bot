apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: car-inspection
  labels:
    app.kubernetes.io/name: api-service
    app.kubernetes.io/part-of: car-inspection-assistant
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-service
        app.kubernetes.io/part-of: car-inspection-assistant
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: api-service
          image: car-inspection/api-service:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: car-inspection-config
            - secretRef:
                name: car-inspection-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: car-inspection
  labels:
    app.kubernetes.io/name: api-service
    app.kubernetes.io/part-of: car-inspection-assistant
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: api-service
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-service
  namespace: car-inspection
  labels:
    app.kubernetes.io/name: api-service
    app.kubernetes.io/part-of: car-inspection-assistant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
